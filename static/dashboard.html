<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARK 代币数据监控看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e293b, #334155); padding: 20px 30px; border-bottom: 1px solid rgba(148,163,184,0.15); text-align: center; }
.header h1 { font-size: 24px; font-weight: 700; color: #f1f5f9; }
.header .sub { font-size: 13px; color: #94a3b8; margin-top: 4px; }
.header .update-time { font-size: 14px; color: #60a5fa; margin-top: 2px; font-weight: 500; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.live-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: rgba(74,222,128,0.15); color: #4ade80; margin-left: 8px; animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
.cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 30px; }
.card { background: linear-gradient(135deg, #1e293b, #2d3a4e); border-radius: 12px; padding: 20px; border: 1px solid rgba(148,163,184,0.1); }
.card .label { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: 700; transition: color 0.3s; }
.card .value.positive { color: #4ade80; }
.card .value.negative { color: #f87171; }
.card .value.neutral { color: #fbbf24; }
.card .value.info { color: #60a5fa; }
.charts-section { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 30px; }
.chart-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid rgba(148,163,184,0.1); }
.chart-card h3 { font-size: 15px; color: #94a3b8; margin-bottom: 12px; }
.chart-card canvas { max-height: 280px; }
.table-section { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid rgba(148,163,184,0.1); margin-bottom: 30px; }
.table-section h3 { font-size: 15px; color: #94a3b8; margin-bottom: 12px; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 12px; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(148,163,184,0.1); }
td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid rgba(148,163,184,0.05); }
tr:hover td { background: rgba(148,163,184,0.05); }
td.num { text-align: right; font-family: 'SF Mono', 'Fira Code', monospace; }
td.pos { color: #4ade80; }
td.neg { color: #f87171; }
td.info { color: #60a5fa; }
</style>
</head>
<body>

<div class="header">
  <h1>🏷️ ARK 代币数据实时监控看板 <span class="live-badge">● 实时</span></h1>
  <div class="update-time" id="updateTime">⏳ 正在连接...</div>
  <div class="sub" id="updateStatus">连接实时数据中...</div>
</div>

<div class="container">
  <div class="cards">
    <div class="card">
      <div class="label">💰 今日动静态提取</div>
      <div class="value negative" id="todayBonus">--</div>
    </div>
    <div class="card">
      <div class="label">📥 今日新增质押</div>
      <div class="value positive" id="todayStakeIn">--</div>
    </div>
    <div class="card">
      <div class="label">📤 今日赎回</div>
      <div class="value negative" id="todayStakeOut">--</div>
    </div>
    <div class="card">
      <div class="label">📊 今日净质押</div>
      <div class="value" id="todayNetStake">--</div>
    </div>
  </div>

  <div class="charts-section">
    <div class="chart-card">
      <h3>📈 奖金池每日流出趋势</h3>
      <canvas id="chartBonus"></canvas>
    </div>
    <div class="chart-card">
      <h3>📊 每日新增质押 & 净质押</h3>
      <canvas id="chartStake"></canvas>
    </div>
  </div>

  <div class="table-section">
    <h3>📋 过去7天每日汇总</h3>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th style="text-align:right">动静态提取</th>
          <th style="text-align:right">奖金池余额</th>
          <th style="text-align:right">新增质押</th>
          <th style="text-align:right">赎回</th>
          <th style="text-align:right">质押池余额</th>
          <th style="text-align:right">净质押</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" style="text-align:center;color:#64748b;">等待数据...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let bonusChart = null;
let stakeChart = null;

function fmt(v) {
  if (v === undefined || v === null) return '--';
  return Number(v).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4});
}
function fmtFull(v) {
  return Number(v).toLocaleString(undefined, {minimumFractionDigits: 4, maximumFractionDigits: 4});
}

function updateDashboard(data) {
  const summary = data.daily_summary || {};
  const today = summary[Object.keys(summary).sort().pop()] || {};
  
  // Update cards
  document.getElementById('todayBonus').textContent = fmt(today.bonus_withdrawal);
  document.getElementById('todayStakeIn').textContent = fmt(today.stake_in);
  document.getElementById('todayStakeOut').textContent = fmt(today.stake_out);
  const netEl = document.getElementById('todayNetStake');
  netEl.textContent = fmt(today.net_stake);
  netEl.className = 'value ' + (today.net_stake >= 0 ? 'positive' : 'negative');
  
  // Update time
  const updateDate = data.last_updated ? new Date(data.last_updated) : null;
  const localTime = updateDate ? updateDate.toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai', timeZoneName: 'short'}) : '--';
  document.getElementById('updateTime').textContent = '🕐 最新更新: ' + localTime;
  document.getElementById('updateStatus').textContent = '📦 区块: ' + (data.current_block || '--').toLocaleString() + ' | 实时监控中 (15秒轮询)';
  
  // Charts
  updateCharts(summary);
  // Table
  updateTable(summary);
}

function updateCharts(summary) {
  const dates = Object.keys(summary).sort();
  if (dates.length === 0) return;
  const labels = dates.map(d => d.slice(5));
  const bonusOut = dates.map(d => summary[d].bonus_withdrawal || 0);
  const stakeIn = dates.map(d => summary[d].stake_in || 0);
  const netStake = dates.map(d => summary[d].net_stake || 0);

  if (bonusChart) bonusChart.destroy();
  bonusChart = new Chart(document.getElementById('chartBonus'), {
    type: 'bar',
    data: { labels, datasets: [{ label: '动静态提取', data: bonusOut, backgroundColor: 'rgba(248,113,113,0.6)', borderColor: '#f87171', borderWidth: 1, borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } }, scales: { x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(148,163,184,0.05)' } }, y: { ticks: { color: '#64748b', callback: v => fmt(v) }, grid: { color: 'rgba(148,163,184,0.08)' } } } }
  });
  if (stakeChart) stakeChart.destroy();
  stakeChart = new Chart(document.getElementById('chartStake'), {
    type: 'bar',
    data: { labels, datasets: [
      { label: '新增质押', data: stakeIn, backgroundColor: 'rgba(74,222,128,0.6)', borderColor: '#4ade80', borderWidth: 1, borderRadius: 4 },
      { label: '净质押', data: netStake, type: 'line', borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,0.1)', borderWidth: 2, pointBackgroundColor: '#60a5fa', pointRadius: 4, fill: true, tension: 0.3 }
    ]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } }, scales: { x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(148,163,184,0.05)' } }, y: { ticks: { color: '#64748b', callback: v => fmt(v) }, grid: { color: 'rgba(148,163,184,0.08)' } } } }
  });
}

function updateTable(summary) {
  const dates = Object.keys(summary).sort().reverse();
  const tbody = document.getElementById('tableBody');
  if (dates.length === 0) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#64748b;">暂无数据</td></tr>'; return; }
  tbody.innerHTML = dates.map(d => {
    const r = summary[d];
    const net = r.net_stake || 0;
    return `<tr><td>${d}</td><td class="num neg">${fmtFull(r.bonus_withdrawal)}</td><td class="num info">${fmtFull(r.bonus_balance)}</td><td class="num pos">${fmtFull(r.stake_in)}</td><td class="num neg">${fmtFull(r.stake_out)}</td><td class="num info">${fmtFull(r.stake_balance)}</td><td class="num ${net >= 0 ? 'pos' : 'neg'}">${fmtFull(net)}</td></tr>`;
  }).join('');
}

// Connect via WebSocket
const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
const wsUrl = protocol + '//' + location.host;
let ws = null;

function connectWS() {
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    document.getElementById('updateTime').textContent = '🕐 等待数据...';
    document.getElementById('updateStatus').textContent = '● 已连接实时通道';
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'full_update') {
      updateDashboard(msg.data);
    }
  };
  ws.onclose = () => {
    document.getElementById('updateStatus').textContent = '⚠️ 连接断开，5秒后重连...';
    setTimeout(connectWS, 5000);
  };
  ws.onerror = () => { ws.close(); };
}

// Also poll REST API as fallback
async function pollRest() {
  try {
    const r = await fetch('/api/data');
    const data = await r.json();
    if (data.daily_summary && Object.keys(data.daily_summary).length > 0) {
      updateDashboard(data);
    }
  } catch(e) {}
}

// Start
connectWS();
pollRest();
setInterval(pollRest, 15000);
</script>
</body>
</html>
